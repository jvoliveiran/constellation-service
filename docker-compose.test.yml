services:
  postgres-test:
    image: postgres:16
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: constellation_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test']
      interval: 5s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:7.2
    ports:
      - '6380:6379'
    command: redis-server --requirepass test
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'test', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
