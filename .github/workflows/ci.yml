name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: constellation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/constellation_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      NODE_ENV: test
      FEDERATION_ENABLED: 'false'
      OTEL_SDK_DISABLED: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test -- --passWithNoTests

      - name: E2E Tests
        run: npm run test:e2e

      - name: Schema Freshness Check
        run: |
          npm run build
          node dist/main &
          APP_PID=$!
          sleep 5
          kill $APP_PID 2>/dev/null || true
          git diff --exit-code src/schema.gql

      - name: Install Rover CLI
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH

      - name: Validate Subgraph Schema
        run: rover subgraph check --schema src/schema.gql --name constellation-service || true

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Build Docker Image
        run: docker build -t constellation-service:ci .
